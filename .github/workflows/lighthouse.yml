name: Lighthouse & A11y

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # frozen-lockfile: Lockfile-Drift soll hier auffliegen, nicht erst auf Vercel
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lighthouse CI (Performance + A11y + SEO Budgets)
        run: npx --yes @lhci/cli@0.15.x autorun

      - name: Reports als Artifact sichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          retention-days: 30
